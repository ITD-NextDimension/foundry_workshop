kind: Workflow
name: customer-support-triage
description: Front-desk routing for Contoso customer support harness.

trigger:
  kind: OnConversationStart
  id: customer_support_triage
  actions:
    - kind: InvokeAzureAgent
      id: triage
      agent:
        name: triage-agent
      output:
        autoSend: false
        responseObject: Local.Triage

    - kind: ConditionGroup
      conditions:
        - condition: =Local.Triage.needsClarification
          actions:
            - kind: SendActivity
              activity:
                text: =Local.Triage.clarificationQuestion

        - condition: =Local.Triage.category = "Technical"
          actions:
            - kind: InvokeAzureAgent
              agent:
                name: tech-support-agent
              output:
                autoSend: true

        - condition: =Local.Triage.category = "Billing"
          actions:
            - kind: InvokeAzureAgent
              agent:
                name: billing-agent
              output:
                autoSend: true

        - condition: =Local.Triage.category = "KB"
          actions:
            - kind: InvokeAzureAgent
              agent:
                name: kb-agent
              output:
                autoSend: true

      elseActions:
        - kind: SendActivity
          activity:
            text: =Local.Triage.reply

    - kind: EndWorkflow
